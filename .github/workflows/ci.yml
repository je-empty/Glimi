name: CI

on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  checks:
    runs-on: ubuntu-latest
    # Resolve glimi / community / workspace from their project dirs (robust `python -m`
    # + imports, independent of editable-install finder quirks). Absolute so it holds
    # across a `cd` into a project folder.
    env:
      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/glimi-core:${{ github.workspace }}/glimi-community:${{ github.workspace }}/glimi-workspace
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Workspace monorepo: install the kernel first (so the apps' `glimi[dashboard]`
      # dependency resolves to the local editable), then the two apps.
      - name: Install (editable — kernel + apps)
        run: |
          pip install -e "./glimi-core[dashboard]"
          pip install -e ./glimi-community -e ./glimi-workspace pytest
      - name: Syntax check
        run: python -m compileall -q glimi-core/glimi glimi-core/eval glimi-community/community glimi-workspace/workspace tests
      - name: Unit tests (kernel + apps)
        # test_community_isolation needs a seeded multi-community DB (shared-state) → run separately (#5)
        run: python -m pytest tests/unit/ -q --ignore=tests/unit/test_community_isolation.py
      - name: Eval harness structure check (echo, no LLM cost)
        # echo backend = deterministic, no Claude CLI / API key. Loads + schema-validates
        # every golden case, runs each through the real runtime + deterministic checks,
        # SKIPS the LLM judge. Scored regression (claude_cli + eval gate) is manual.
        run: python -m eval run --backend echo
