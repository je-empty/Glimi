name: CI

on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Syntax check
        run: python -m compileall -q glimi eval community tests
      - name: Unit tests (kernel + formatting)
        run: |
          pip install -e . pytest
          python -m pytest tests/unit/ -q --ignore=tests/unit/test_community_isolation.py
      # 격리 테스트(test_community_isolation)는 별도 DB 셋업 후 추가 (#5)
      - name: Eval harness structure check (echo, no LLM cost)
        # echo backend = deterministic, no Claude CLI, no API key. Loads + schema-
        # validates every golden case, runs each through the real runtime, runs the
        # deterministic checks, and SKIPS the LLM judge. Scored regression
        # (`python -m eval run --backend claude_cli` + `eval gate`) is opt-in/manual.
        run: python -m eval run --backend echo
