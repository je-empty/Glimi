[project]
name = "chaos"
version = "0.1.0"
description = "Claude Agent 기반 소셜 시뮬레이션 시스템"
requires-python = ">=3.11"
dependencies = [
    "discord.py>=2.3.0",
    "python-dotenv>=1.0.0",
    "rich>=13.0.0",
    "Pillow>=10.0.0",
    "textual>=0.40.0",
]

[project.scripts]
chaos-cli = "src.cli:main"
chaos-bot = "src.discord_bot:main"
