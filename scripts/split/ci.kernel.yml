name: CI
on:
  pull_request:
  push:
    branches: [main, develop]
jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -e ".[dashboard]" pytest httpx
      - name: Syntax check
        run: python -m compileall -q glimi eval tests
      - name: Unit tests (kernel)
        run: python -m pytest tests/unit/ -q
      - name: Eval harness (echo, no LLM cost)
        run: python -m eval run --backend echo
