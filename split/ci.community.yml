name: CI
on:
  pull_request:
  push:
    branches: [main, develop]
jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      # Published kernel proves the contract; in dev use the editable path repo.
      - run: pip install "glimi[dashboard]>=0.1.0" pytest httpx
      - run: pip install -e .          # discord.py + community deps
      - name: Syntax check
        run: python -m compileall -q src tests
      - name: Unit tests
        # test_community_isolation needs a dedicated DB setup (kept --ignore as in the monorepo).
        run: python -m pytest tests/unit/ -q --ignore=tests/unit/test_community_isolation.py
