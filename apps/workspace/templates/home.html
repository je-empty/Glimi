<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Glimi Workspace</title>
  <link rel="stylesheet" href="/static/css/tokens.css">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.5;
    }
    .wrap { max-width: 980px; margin: 0 auto; padding: 28px 20px 64px; }
    header.top {
      display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap;
      padding-bottom: 18px; border-bottom: 1px solid var(--border-soft); margin-bottom: 26px;
    }
    .brand-name { font-size: 22px; font-weight: 700; letter-spacing: -0.01em; }
    .brand-sub { color: var(--text-dim); font-size: 14px; }
    .lede { color: var(--text-dim); font-size: 14px; margin: 4px 0 0; flex-basis: 100%; }
    h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.06em;
         color: var(--text-faint); margin: 0 0 12px; font-weight: 700; }
    .cards { display: grid; gap: 14px; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
    a.card {
      display: block; text-decoration: none; color: inherit;
      background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
      padding: 16px 18px; box-shadow: var(--shadow); transition: box-shadow .15s, transform .15s;
    }
    a.card:hover { box-shadow: var(--shadow-lg); transform: translateY(-1px); }
    .card .title-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .card .title { font-size: 16px; font-weight: 600; }
    .badge {
      font-size: 11px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
      padding: 2px 7px; border-radius: 999px; background: var(--accent-soft); color: var(--accent);
    }
    .badge.demo { background: var(--accent-soft); color: var(--accent); }
    .card .goal { color: var(--text-dim); font-size: 13px; margin: 2px 0 10px;
                  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card .meta { color: var(--text-faint); font-size: 12px; display: flex; gap: 12px; flex-wrap: wrap; }
    section.create {
      margin-top: 34px; background: var(--panel-2); border: 1px solid var(--border);
      border-radius: 12px; padding: 18px 20px;
    }
    .create form { display: grid; gap: 12px; }
    .field { display: grid; gap: 4px; }
    .field label { font-size: 12px; color: var(--text-dim); font-weight: 600; }
    .field input {
      width: 100%; padding: 9px 11px; font-size: 14px; color: var(--text);
      background: var(--bg-elev); border: 1px solid var(--border); border-radius: 8px;
    }
    .field input:focus { outline: none; border-color: var(--accent); }
    button.primary {
      justify-self: start; padding: 9px 18px; font-size: 14px; font-weight: 600;
      color: var(--accent-fg); background: var(--accent); border: none; border-radius: 8px; cursor: pointer;
    }
    button.primary:hover { filter: brightness(1.06); }
    .empty { color: var(--text-faint); font-size: 14px; }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="top">
      <span class="brand-name">Glimi Workspace</span>
      <span class="brand-sub">specialist teams on Glimi Core</span>
      <p class="lede">Open a workspace to watch its team work — the connection graph,
        each member's 5-layer memory, channels, and live usage. Create a new one with
        a goal and a fresh team forms around it.</p>
    </header>

    <h2>Workspaces</h2>
    <div class="cards" id="cards">
      <div class="empty">Loading workspaces…</div>
    </div>

    <section class="create">
      <h2>Create a workspace</h2>
      <form method="post" action="/api/workspaces">
        <div class="field">
          <label for="name">Your name</label>
          <input id="name" name="name" type="text" placeholder="Owner" autocomplete="off">
        </div>
        <div class="field">
          <label for="goal">Goal</label>
          <input id="goal" name="goal" type="text"
                 placeholder="Plan the public launch of our open-source project" autocomplete="off">
        </div>
        <button class="primary" type="submit">Create workspace</button>
      </form>
    </section>
  </div>

  <script>
    (function () {
      const esc = (s) => String(s == null ? "" : s)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
      async function load() {
        let list = [];
        try {
          const r = await fetch("/api/workspaces");
          if (r.ok) list = await r.json();
        } catch (_) {}
        const host = document.getElementById("cards");
        if (!Array.isArray(list) || list.length === 0) {
          host.innerHTML = '<div class="empty">No workspaces yet.</div>';
          return;
        }
        host.innerHTML = list.map((w) => {
          const badge = w.kind === "demo"
            ? '<span class="badge demo">Demo · read-only</span>' : "";
          const goal = w.goal ? '<div class="goal">' + esc(w.goal) + "</div>" : "";
          return '<a class="card" href="/w/' + encodeURIComponent(w.id) + '">'
            + '<div class="title-row"><span class="title">' + esc(w.title || w.id)
            + "</span>" + badge + "</div>"
            + goal
            + '<div class="meta"><span>' + (w.agents || 0) + " agents</span>"
            + "<span>" + (w.channels || 0) + " channels</span></div>"
            + "</a>";
        }).join("");
      }
      load();
    })();
  </script>
</body>
</html>
