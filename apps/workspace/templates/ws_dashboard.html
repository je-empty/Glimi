<!DOCTYPE html>
<html lang="en" data-theme="light">
<!--
  Workspace dashboard — the Community-style primary view for /w/{id}.

  Chat is the main surface (the copied _chat_shell.html, driven by the adapted
  /wstatic/js/chat.js against the per-workspace /w/{id}/chat read-APIs). A small
  left rail switches between Chat (default) and Overview (a link to the existing
  Core connection-graph dashboard, now served at /w/{id}/graph).

  The server fills the {{...}} placeholders below via str.replace (this app does
  not run Jinja). Injected client state:
    window.__GLIMI_WS_BASE__  → "/w/{id}"   (chat.js apiBase()/avatarUrl())
    window.__GLIMI_USER__     → owner name  (chat.js OWNER_NAME, default "You")
    window.__GLIMI_EMBEDDED__ → false       (chat.js auto-boots on load)
    window.__GLIMI_READONLY__ → true        (demo: composer locked + banner)
-->
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ws_title}} — Glimi Workspace</title>
  <!-- FOUC guard: apply the saved theme before paint (matches the platform key). -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('glimi-theme');
        if (t) document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();
  </script>
  <!-- tokens.css stays workspace-local (carries the --chat-* vars). chat.css +
       chat.js are the CANONICAL shared client from glimi/dashboard, mounted at
       /static — both apps load one source so they can't drift again. -->
  <link rel="stylesheet" href="/wstatic/css/tokens.css">
  <link rel="stylesheet" href="/static/css/chat.css">
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans, -apple-system, BlinkMacSystemFont, "Segoe UI",
                   Roboto, Helvetica, Arial, sans-serif);
      line-height: 1.5;
    }
    /* App frame: a slim left nav rail + the active view. */
    .ws-frame { display: flex; height: 100dvh; min-height: 0; }
    .ws-rail {
      flex: 0 0 64px; width: 64px;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      padding: 14px 0; border-right: 1px solid var(--border-soft);
      background: var(--panel-2, var(--panel));
    }
    .ws-rail .logo {
      width: 36px; height: 36px; border-radius: 10px;
      display: grid; place-items: center; margin-bottom: 8px;
      background: var(--chat-accent-soft, var(--accent-soft));
      color: var(--chat-accent, var(--accent)); font-size: 20px;
    }
    .ws-rail a.nav {
      width: 44px; height: 44px; border-radius: 12px;
      display: grid; place-items: center; text-decoration: none;
      color: var(--text-dim); font-size: 20px;
      transition: background .15s, color .15s;
    }
    .ws-rail a.nav:hover { background: var(--chat-row-hover, var(--panel-3)); color: var(--text); }
    .ws-rail a.nav.on {
      background: var(--chat-accent-soft, var(--accent-soft));
      color: var(--chat-accent, var(--accent));
    }
    .ws-rail a.nav .lbl {
      position: absolute; left: 70px; padding: 4px 8px; border-radius: 6px;
      background: var(--text); color: var(--bg); font-size: 12px; white-space: nowrap;
      opacity: 0; pointer-events: none; transform: translateX(-4px);
      transition: opacity .12s, transform .12s; z-index: 5;
    }
    .ws-rail a.nav { position: relative; }
    .ws-rail a.nav:hover .lbl { opacity: 1; transform: translateX(0); }
    .ws-rail .spacer { flex: 1 1 auto; }
    /* The view area hosts the chat shell, which is itself full-height. */
    .ws-view { flex: 1 1 auto; min-width: 0; min-height: 0; display: flex; }
    .ws-view .chat-shell { flex: 1 1 auto; min-width: 0; }
  </style>
</head>
<body data-ws-base="{{ws_base}}">
  <script>
    // Client state for the adapted chat.js (see <head> note).
    window.__GLIMI_WS_BASE__ = "{{ws_base}}";
    window.__GLIMI_USER__ = "{{owner_name}}";
    window.__GLIMI_EMBEDDED__ = false;        // standalone page → chat.js auto-boots
    window.__GLIMI_READONLY__ = {{readonly}}; // demo workspaces lock the composer
  </script>

  <div class="ws-frame">
    <nav class="ws-rail" aria-label="Workspace navigation">
      <span class="logo" aria-hidden="true"><i class="ti ti-sparkles"></i></span>
      <a class="nav on" href="{{ws_base}}" aria-current="page" aria-label="Chat">
        <i class="ti ti-messages" aria-hidden="true"></i><span class="lbl">Chat</span>
      </a>
      <a class="nav" href="{{ws_base}}/graph" aria-label="Overview">
        <i class="ti ti-affiliate" aria-hidden="true"></i><span class="lbl">Overview</span>
      </a>
      <span class="spacer"></span>
      <a class="nav" href="/" aria-label="All workspaces">
        <i class="ti ti-layout-grid" aria-hidden="true"></i><span class="lbl">All workspaces</span>
      </a>
    </nav>

    <main class="ws-view">
      <!--CHAT_SHELL-->
    </main>
  </div>

  <script src="/static/js/chat.js"></script>
</body>
</html>
