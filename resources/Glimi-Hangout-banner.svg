<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" role="img" aria-label="Glimi Hangout — a little circle of AI friends connected to you">
  <defs>
    <radialGradient id="bg" cx="68%" cy="50%" r="62%">
      <stop offset="0" stop-color="#23244a"/>
      <stop offset="0.55" stop-color="#1b1c38"/>
      <stop offset="1" stop-color="#15162c"/>
    </radialGradient>
    <radialGradient id="hub" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#f5e9c8" stop-opacity="0.5"/>
      <stop offset="0.5" stop-color="#f5e9c8" stop-opacity="0.13"/>
      <stop offset="1" stop-color="#f5e9c8" stop-opacity="0"/>
    </radialGradient>
    <!-- 얼굴 없는 앉은 실루엣 (currentColor 로 색 지정) -->
    <g id="fig">
      <ellipse cx="0" cy="-12" rx="21" ry="19" fill="#f5e9c8" opacity="0.06"/>
      <ellipse cx="0" cy="-12" rx="13" ry="12" fill="#f5e9c8" opacity="0.10"/>
      <path d="M-16 1 C-18 -20 -10 -27 0 -27 C10 -27 18 -20 16 1 C16 4 -16 4 -16 1 Z" fill="currentColor"/>
      <circle cx="0" cy="-34" r="8.6" fill="currentColor"/>
    </g>
  </defs>

  <rect width="1280" height="400" rx="20" fill="url(#bg)"/>

  <!-- 흩뿌린 빛 점 -->
  <g fill="#8a8fb8">
    <circle cx="540" cy="60" r="1"/><circle cx="1180" cy="70" r="1.1"/><circle cx="1230" cy="300" r="1"/>
    <circle cx="610" cy="330" r="0.9"/><circle cx="1150" cy="350" r="0.9"/><circle cx="980" cy="36" r="1"/>
    <circle cx="660" cy="150" r="0.8"/><circle cx="1245" cy="180" r="0.8"/><circle cx="700" cy="360" r="0.8"/>
  </g>

  <!-- 중심 따뜻한 빛 -->
  <ellipse cx="880" cy="205" rx="210" ry="170" fill="url(#hub)"/>

  <!-- 연결선: 중심 → 각 친구 (관계 그래프) -->
  <g stroke="#aeb6e8" fill="none" stroke-linecap="round">
    <line x1="880" y1="205" x2="880" y2="70" stroke-width="1.4" opacity="0.45"/>
    <line x1="880" y1="205" x2="1024" y2="119" stroke-width="1.4" opacity="0.42"/>
    <line x1="880" y1="205" x2="1060" y2="229" stroke-width="1.4" opacity="0.4"/>
    <line x1="880" y1="205" x2="960" y2="317" stroke-width="1.4" opacity="0.4"/>
    <line x1="880" y1="205" x2="800" y2="317" stroke-width="1.4" opacity="0.42"/>
    <line x1="880" y1="205" x2="700" y2="229" stroke-width="1.6" opacity="0.5"/>
    <line x1="880" y1="205" x2="736" y2="119" stroke-width="1.4" opacity="0.42"/>
  </g>
  <!-- 둘레 점선 (이웃 친구끼리) -->
  <g stroke="#aeb6e8" fill="none" stroke-width="1" opacity="0.22" stroke-dasharray="1 6" stroke-linecap="round">
    <line x1="880" y1="70" x2="1024" y2="119"/>
    <line x1="1024" y1="119" x2="1060" y2="229"/>
    <line x1="1060" y1="229" x2="960" y2="317"/>
    <line x1="960" y1="317" x2="800" y2="317"/>
    <line x1="800" y1="317" x2="700" y2="229"/>
    <line x1="700" y1="229" x2="736" y2="119"/>
    <line x1="736" y1="119" x2="880" y2="70"/>
  </g>
  <!-- 귓속말 페어(좌상단 G·A) — 사용자 쪽으로 호 그리는 점선 -->
  <path d="M736 119 Q 820 150 880 200" fill="none" stroke="#f472b6" stroke-width="1" opacity="0.4" stroke-dasharray="1 5" stroke-linecap="round"/>

  <!-- 노드 스파클 -->
  <g fill="#fdf6e3">
    <circle cx="880" cy="137" r="1.6" opacity="0.85"/><circle cx="952" cy="162" r="1.5" opacity="0.8"/>
    <circle cx="970" cy="217" r="1.6" opacity="0.8"/><circle cx="920" cy="261" r="1.5" opacity="0.8"/>
    <circle cx="840" cy="261" r="1.5" opacity="0.8"/><circle cx="790" cy="217" r="1.6" opacity="0.85"/>
    <circle cx="808" cy="162" r="1.5" opacity="0.8"/>
  </g>

  <!-- 친구들 (얼굴 없는 실루엣) — 둘러앉은 원 -->
  <use href="#fig" transform="translate(880,70)" style="color:#f3ecd2"/>
  <use href="#fig" transform="translate(1024,119)" style="color:#929dcb"/>
  <use href="#fig" transform="translate(1060,229)" style="color:#aeb6e8"/>
  <use href="#fig" transform="translate(960,317)" style="color:#7f8cc1"/>
  <use href="#fig" transform="translate(800,317)" style="color:#e9e1c6"/>
  <use href="#fig" transform="translate(700,229)" style="color:#b3bbe9"/>
  <use href="#fig" transform="translate(736,119) rotate(10)" style="color:#9aa3ce"/>

  <!-- 사용자 (중심, 핑크 hub) — 살짝 크게 -->
  <ellipse cx="880" cy="193" rx="30" ry="27" fill="#f472b6" opacity="0.16"/>
  <use href="#fig" transform="translate(880,205) scale(1.16)" style="color:#f472b6"/>

  <!-- 워드마크 (좌측 여백) -->
  <g font-family="Pretendard, -apple-system, 'Segoe UI', sans-serif">
    <g transform="translate(72,118)">
      <circle cx="6" cy="6" r="4.4" fill="#f3ecd2"/>
      <path d="M14 2.5 A11 11 0 0 1 30.5 6.5" fill="none" stroke="#565d8f" stroke-width="2.2" stroke-linecap="round"/>
      <circle cx="32.5" cy="8.5" r="5" fill="#f472b6"/>
      <text x="50" y="11.5" font-size="12.5" letter-spacing="3" fill="#8a8fb8" font-family="'JetBrains Mono', Menlo, monospace">GLIMI COMMUNITY</text>
    </g>
    <text x="70" y="196" font-size="48" font-weight="650" letter-spacing="-0.5" fill="#f1f1f8">Glimi Hangout</text>
    <text x="72" y="234" font-size="16.5" fill="#b9bdd9">AI friends who keep living their own lives — even while you're away.</text>
    <text x="72" y="262" font-size="14" fill="#8a8fb8">당신이 없는 동안에도 자기들끼리 살아가는 친구들</text>
  </g>
</svg>
