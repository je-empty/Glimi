{% extends "base.html" %}
{% block title %}{{ agent_id }} · {{ community_name }} · Glimi{% endblock %}

{% block head %}
<!-- 에이전트 상세 페이지는 대시보드 모달 CSS (detail-section, mem-item, msg 등) 를 재사용 -->
<link rel="stylesheet" href="/static/css/dashboard.css?v={{ asset_v }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* dashboard.css 에 `html, body { height:100%; overflow:hidden }` 가 있어서
     상세 페이지 body 스크롤이 막힌다. 여기서만 override.
     + 앵커 점프 시 topbar 아래로 여백 확보 (scroll-padding-top). */
  html, body {
    height: auto !important;
    overflow: visible !important;
    min-height: 100%;
    scroll-padding-top: 80px;
    scroll-behavior: smooth;
  }
  /* dashboard.css 의 `main { overflow:hidden; display:flex; ... }` 해제.
     앵커 점프 시 섹션이 topbar 에 가리지 않게 scroll-margin-top 지정. */
  main.page-body,
  main.page-body[id] {
    overflow: visible !important;
  }
  main.page-body section[id] { scroll-margin-top: 72px; }
  html { scroll-padding-top: 72px; }
  body {
    font: 13px/1.55 "Inter", -apple-system, BlinkMacSystemFont, "Pretendard", "Noto Sans KR", sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    background: var(--bg);
    color: var(--text);
  }
  .agent-page {
    max-width: 1200px;
    margin: 20px auto;
    padding: 0 20px 80px;
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 24px;
  }
  .agent-page header.page-head {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 20px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: var(--shadow);
  }
  /* Avatar wrap — 모달과 동일 스타일 (둥근 프레임 + 우측 하단 emoji badge).
     overflow visible 필수 (badge 가 프레임 밖으로 살짝 튀어나오는 디자인). */
  .agent-page header.page-head .avatar-wrap {
    position: relative;
    width: 88px; height: 88px; border-radius: 50%;
    flex-shrink: 0; background: var(--panel-2);
    border: 3px solid var(--border-soft);
    overflow: visible;
  }
  .agent-page header.page-head .avatar-wrap img {
    width: 100%; height: 100%; object-fit: cover;
    border-radius: 50%;
  }
  .agent-page header.page-head .avatar-wrap .emoji-badge {
    position: absolute; bottom: -4px; right: -4px;
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--bg-elev); border: 3px solid var(--bg-elev);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; box-shadow: var(--shadow);
  }
  .agent-page header.page-head .avatar-wrap .emoji-badge.hidden { display: none; }
  .agent-page header.page-head .hd-text { flex: 1; min-width: 0; }
  .agent-page header.page-head .hd-name {
    font-size: 22px; font-weight: 700; letter-spacing: -0.3px;
  }
  .agent-page header.page-head .hd-sub {
    color: var(--text-dim); font-size: 12.5px; margin-top: 4px;
  }
  .agent-page header.page-head .hd-back {
    color: var(--text-dim); text-decoration: none; font-size: 12px;
    padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px;
  }
  .agent-page header.page-head .hd-back:hover { border-color: var(--accent); color: var(--accent); }

  aside.side-nav {
    position: sticky; top: 76px; /* gp-topbar (56px) + gap */
    align-self: start;
    display: flex; flex-direction: column; gap: 4px;
    padding: 10px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: var(--shadow);
    max-height: calc(100vh - 96px);
    overflow-y: auto;
  }
  aside.side-nav a {
    padding: 8px 12px;
    color: var(--text-dim);
    text-decoration: none;
    font-size: 12.5px;
    font-weight: 500;
    border-radius: 6px;
    transition: all 0.12s;
  }
  aside.side-nav a:hover { background: var(--panel-2); color: var(--text); }
  aside.side-nav a.active { background: var(--accent); color: var(--accent-fg, #fff); }
  aside.side-nav .nav-title {
    font-size: 10.5px; font-weight: 700;
    color: var(--text-faint); text-transform: uppercase;
    letter-spacing: 1.2px; padding: 6px 12px 4px;
  }

  main.page-body {
    min-width: 0;
    display: flex; flex-direction: column; gap: 16px;
  }
  main.page-body .detail-section {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 22px;
    box-shadow: var(--shadow);
  }
  main.page-body .detail-section + .detail-section { margin-top: 0; }

  .loading {
    padding: 40px;
    text-align: center;
    color: var(--text-dim);
  }

  @media (max-width: 720px) {
    .agent-page { grid-template-columns: 1fr; }
    aside.side-nav { position: static; max-height: none; }
  }
</style>
{% endblock %}

{% block body %}
<div class="agent-page">
  <header class="page-head">
    <div class="avatar-wrap" id="agent-avatar">
      <img id="agent-avatar-img" src="" alt="" style="display:none">
      <span class="emoji-badge hidden" id="agent-emoji-badge"></span>
    </div>
    <div class="hd-text">
      <div class="hd-name" id="agent-name">에이전트 로드 중…</div>
      <div class="hd-sub" id="agent-sub">{{ community_name }} · <span id="agent-type">—</span></div>
    </div>
    <a class="hd-back" href="/community/{{ community_id }}">← 대시보드</a>
  </header>

  <aside class="side-nav">
    <div class="nav-title">SECTIONS</div>
    <a href="#status" class="nav-link" data-target="status">📊 상태</a>
    <a href="#profile" class="nav-link" data-target="profile">👤 프로필</a>
    <a href="#relationships" class="nav-link" data-target="relationships">🤝 관계</a>
    <a href="#memory" class="nav-link" data-target="memory">🧠 메모리</a>
    <a href="#thinking" class="nav-link" data-target="thinking">💭 추론 로그</a>
    <a href="#chat" class="nav-link" data-target="chat">💬 최근 대화</a>
  </aside>

  <main class="page-body" id="page-body">
    <div class="loading">불러오는 중…</div>
  </main>
</div>

<script>
  window.__GLIMI_COMMUNITY__ = {{ community_id|tojson }};
  window.__GLIMI_AGENT_ID__ = {{ agent_id|tojson }};
</script>
<script>
(function() {
  const CID = window.__GLIMI_COMMUNITY__;
  const AID = window.__GLIMI_AGENT_ID__;

  // ── helpers (dashboard.js 와 동일 규칙) ─────────────────────────
  function esc(s) {
    return String(s ?? '').replace(/[<>&"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));
  }
  function q(u) {
    return CID ? `${u}${u.includes('?') ? '&' : '?'}community=${encodeURIComponent(CID)}` : u;
  }
  async function j(u) {
    try {
      const r = await fetch(u);
      if (!r.ok) return { __httpError: r.status };
      return await r.json();
    } catch (e) {
      return { __fetchError: String(e) };
    }
  }
  function chIcon(ch) {
    if (ch.startsWith('mgr-')) return '🏢';
    if (ch.startsWith('dm-')) return '💬';
    return '#';
  }
  function fmtLocalMonthDayHM(iso) {
    if (!iso) return '';
    try {
      const d = new Date(iso.includes('T') || iso.includes('Z') ? iso : iso.replace(' ', 'T') + 'Z');
      if (isNaN(d.getTime())) return String(iso);
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      const h = String(d.getHours()).padStart(2, '0');
      const min = String(d.getMinutes()).padStart(2, '0');
      return `${m}/${day} ${h}:${min}`;
    } catch { return String(iso); }
  }
  function _fmtMsgTime(iso) {
    if (!iso) return '';
    try {
      const d = new Date(iso.includes('T') || iso.includes('Z') ? iso : iso.replace(' ', 'T') + 'Z');
      if (isNaN(d.getTime())) return String(iso);
      const h = String(d.getHours()).padStart(2, '0');
      const min = String(d.getMinutes()).padStart(2, '0');
      return `${h}:${min}`;
    } catch { return String(iso); }
  }
  function roleClass(m) {
    if (m.is_user) return 'user';
    if (m.speaker_type === 'mgr') return 'mgr';
    if (m.speaker_type === 'creator') return 'creator';
    return 'persona';
  }
  function avatarSrc(id) {
    return `/api/avatar?id=${encodeURIComponent(id)}${CID ? '&community=' + encodeURIComponent(CID) : ''}`;
  }
  function miniAvatarHtml(speakerId, isUser, speakerName) {
    if (isUser) {
      const initial = (speakerName || '?').slice(0, 1);
      return `<div class="msg-avatar user" title="${esc(speakerName)}">${esc(initial)}</div>`;
    }
    return `<div class="msg-avatar" title="${esc(speakerName)}">
      <img src="${avatarSrc(speakerId)}" alt="${esc(speakerName)}" loading="lazy" onerror="this.parentElement.innerHTML='<div style=&quot;display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:11px;color:var(--text-faint)&quot;>?</div>'">
    </div>`;
  }
  function renderMessage(m) {
    return `<div class="msg ${roleClass(m)}">
      ${miniAvatarHtml(m.speaker_id, m.is_user, m.speaker)}
      <div class="msg-body">
        <div class="head">
          <span class="who">${esc(m.speaker)}</span>
          <span class="ch">#${esc(m.channel || '')}</span>
          <span class="ts" title="${esc(m.timestamp || '')}">${esc(_fmtMsgTime(m.timestamp))}</span>
        </div>
        <div class="text">${esc(m.message)}</div>
      </div>
    </div>`;
  }
  // dashboard.js 와 동일 로직 포팅 — 모델 family 별 색상 chip.
  function _modelFamilyClass(p) {
    const s = String(p).toLowerCase();
    if (s.includes('haiku')) return 'm-haiku';
    if (s.includes('sonnet')) return 'm-sonnet';
    if (s.includes('opus')) return 'm-opus';
    if (s.includes('gpt') || s.includes('o1') || s.includes('o3')) return 'm-gpt';
    if (s.includes('gemini')) return 'm-gemini';
    return '';
  }
  function _modelKindIcon(modelId) {
    if (!modelId) return '';
    const s = String(modelId).toLowerCase();
    if (s.startsWith('claude-') || s.startsWith('gpt-') || s.startsWith('gemini-') || s.startsWith('openai')) return '☁️';
    if (s.startsWith('ollama:') || s.startsWith('vllm:') || s.startsWith('llamacpp:') || s.startsWith('local:') || s.includes('llama') || s.includes('qwen') || s.includes('mistral')) return '🖥️';
    return '';
  }
  function renderModelChips(d) {
    if (!d || !d.model) return '';
    const raw = String(d.model);
    const parts = raw.split(/\s*·\s*/).map(s => s.trim()).filter(Boolean);
    const provider = d.provider || '';
    const override = d.model_override ? ' override' : '';
    const title = d.model_override ? 'per-agent override' : 'default';
    const chips = parts.map(p => {
      const fam = _modelFamilyClass(p);
      const classes = ['model-tag', provider, fam, override.trim()].filter(Boolean).join(' ');
      const icon = _modelKindIcon(p);
      return `<span class="${classes}" title="${esc(title)}">${icon ? icon + ' ' : ''}${esc(p)}</span>`;
    }).join('');
    // synthetic(유나 합성 카드·test-user)은 전환 불가 — 클릭 비활성
    if (d.synthetic) return chips;
    return `<span onclick="openAgentModelSwitch(${JSON.stringify(d.model).replace(/"/g,'&quot;')})"
      style="cursor:pointer;display:inline-flex;align-items:center;gap:5px" title="클릭해서 모델 변경">
      ${chips}<i class="ti ti-pencil" style="font-size:12px;color:var(--text-faint)"></i></span>`;
  }

  async function postJson(url, body) {
    try {
      const r = await fetch(url, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)});
      return await r.json();
    } catch (e) { return {error: String(e)}; }
  }

  // 모델 전환 — 상세페이지 인라인 오버레이 picker
  async function openAgentModelSwitch(currentModel) {
    const cat = await j('/api/models');
    const models = (cat && cat.items) || [];
    if (!models.length) { alert('모델 목록을 불러올 수 없습니다'); return; }
    const groupLabel = {cloud: '클라우드', local: '로컬'};
    let html = '';
    ['cloud','local'].forEach(g => {
      const ms = models.filter(m => (m.kind||'cloud') === g);
      if (!ms.length) return;
      html += `<div style="font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;color:var(--text-faint);margin:10px 0 6px">${groupLabel[g]||g}</div>`;
      html += ms.map(m => {
        const checked = m.id === currentModel ? 'checked' : '';
        return `<label style="display:flex;gap:9px;padding:9px 11px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;cursor:pointer;align-items:center">
          <input type="radio" name="am-pick" value="${esc(m.id)}" ${checked}>
          <div style="flex:1"><div style="font-size:13px;font-weight:500">${esc(m.label||m.id)}</div>
          <div style="font-family:var(--font-mono);font-size:10.5px;color:var(--text-dim)">${esc(m.id)} · ${esc(m.tier||'')}</div></div></label>`;
      }).join('');
    });
    const ov = document.createElement('div');
    ov.id = 'am-overlay';
    ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px';
    ov.innerHTML = `<div style="background:var(--panel);border:1px solid var(--border);border-radius:16px;width:min(440px,100%);max-height:85vh;overflow:auto;padding:18px 20px;box-shadow:var(--shadow-lg)" onclick="event.stopPropagation()">
      <div style="font-size:15px;font-weight:500;margin-bottom:4px">모델 변경</div>
      <div style="font-size:12px;color:var(--text-dim);margin-bottom:14px">대화 이력·메모리는 DB 기반이라 보존됩니다. 다음 턴부터 반영 (재시작 불필요).</div>
      <form id="am-form">${html}</form>
      <div style="display:flex;gap:8px;margin-top:14px;justify-content:flex-end">
        <button class="act-btn" onclick="document.getElementById('am-overlay').remove()">취소</button>
        <button class="act-btn" onclick="applyAgentModelSwitch('')">기본값으로</button>
        <button class="act-btn primary" onclick="applyAgentModelSwitch(null)">적용</button>
      </div></div>`;
    ov.onclick = () => ov.remove();
    document.body.appendChild(ov);
  }

  async function applyAgentModelSwitch(forceModel) {
    let model = forceModel;
    if (model === null) {
      const picked = document.querySelector('#am-form input[name="am-pick"]:checked');
      if (!picked) { alert('모델 선택 필요'); return; }
      model = picked.value;
    }
    const r = await postJson(q('/api/action/set_agent_model'), {agent_id: AID, model});
    document.getElementById('am-overlay')?.remove();
    if (r && r.ok) { load(); } else { alert('실패: ' + (r?.error || '알 수 없음')); }
  }

  // 스크립트가 IIFE 라 inline onclick 이 접근하도록 window 노출
  window.openAgentModelSwitch = openAgentModelSwitch;
  window.applyAgentModelSwitch = applyAgentModelSwitch;

  // ── 메인 로드 ─────────────────────────────────────────────────
  async function load() {
    const d = await j(q(`/api/agent?id=${encodeURIComponent(AID)}`));
    if (!d || d.error || d.__httpError || d.__fetchError) {
      const msg = d?.error
        || (d?.__httpError ? `HTTP ${d.__httpError}` : null)
        || d?.__fetchError
        || '에이전트 정보를 불러오지 못했습니다';
      document.getElementById('page-body').innerHTML =
        `<div class="detail-section"><div class="empty">⚠️ ${esc(msg)}</div></div>`;
      return;
    }

    // Header — 이름은 이름만, emoji 는 avatar 우측하단 badge 로 (모달과 통일).
    document.getElementById('agent-name').textContent = d.name || AID;
    document.getElementById('agent-type').textContent = d.type || '—';
    document.title = `${d.name || AID} · Glimi`;
    const img = document.getElementById('agent-avatar-img');
    img.src = avatarSrc(d.id);
    img.alt = d.name || '';
    img.style.display = '';
    img.onerror = () => { img.style.display = 'none'; };
    // Avatar 우측 하단 emoji badge — 평온/없음일 땐 숨김 (카드 hideBadge 와 동일 규칙)
    const badge = document.getElementById('agent-emoji-badge');
    if (d.emoji && d.emotion && d.emotion !== '평온') {
      badge.textContent = d.emoji;
      badge.classList.remove('hidden');
    } else {
      badge.classList.add('hidden');
    }

    // ── 📊 상태 섹션 (emotion / status / model) ──
    // 모달과 동일 기준으로 분리: 실시간 상태 정보만 여기에.
    const statusLines = [];
    if (d.emotion) {
      // 모달과 동일 — emoji+라벨이 바 안에, 강도가 fill 너비. CSS 클래스는 dashboard.css 에서 공유.
      const intensityPct = Math.min(100, (d.intensity || 0) * 10);
      const emotionHtml = `<div class="emotion-bar" title="강도 ${esc(String(d.intensity ?? '?'))}/10">
        <div class="emotion-bar-fill" style="width:${intensityPct}%"></div>
        <div class="emotion-bar-text">${esc(d.emoji || '')} ${esc(d.emotion)}</div>
      </div>`;
      statusLines.push(['감정', emotionHtml, true]);
    }
    if (d.status) {
      let statusLabel;
      if (d.thinking) statusLabel = '<span style="color:var(--thinking,#f59e0b)">🧠 Thinking</span>';
      else if (d.speaking) statusLabel = '<span style="color:var(--speaking,#3b82f6)">💬 Speaking</span>';
      else if (d.status === 'active') statusLabel = '<span style="color:var(--active,#10b981);font-weight:600">● Active</span>';
      else if (d.status === 'inactive') statusLabel = '<span style="color:var(--text-faint)">○ Inactive</span>';
      else statusLabel = '<span style="color:var(--text-dim)">○ ' + esc(d.status) + '</span>';
      statusLines.push(['상태', statusLabel, true]);
    }
    if (d.model) statusLines.push(['모델', renderModelChips(d), true]);

    // ── 👤 프로필 섹션 (본질 정보 — 성격 / 직업 / 외모 / 말투 / 배경) ──
    const joinList = (arr) => (arr || []).map(esc).join(', ');
    const profileLines = [];
    if (d.age) profileLines.push(['나이', `${esc(String(d.age))}${d.birth_year ? ` <span style="color:var(--text-faint)">(${esc(String(d.birth_year))})</span>` : ''}`, true]);
    if (d.gender) profileLines.push(['성별', esc(d.gender), true]);
    if (d.mbti) profileLines.push(['MBTI', esc(d.mbti), true]);
    if (d.enneagram) profileLines.push(['에니어그램', esc(d.enneagram), true]);
    if (d.traits && d.traits.length) profileLines.push(['성격', joinList(d.traits), true]);
    if (d.likes && d.likes.length) profileLines.push(['좋아함', joinList(d.likes), true]);
    if (d.dislikes && d.dislikes.length) profileLines.push(['싫어함', joinList(d.dislikes), true]);
    if (d.hobby) profileLines.push(['취미', esc(d.hobby), true]);
    if (d.values) profileLines.push(['가치관', esc(d.values), true]);
    if (d.occupation) profileLines.push(['직업', esc(d.occupation), true]);
    if (d.routine) profileLines.push(['일상', esc(d.routine), true]);
    if (d.frequent_places && d.frequent_places.length) profileLines.push(['자주 가는 곳', joinList(d.frequent_places), true]);
    if (d.appearance_summary) profileLines.push(['외모', esc(d.appearance_summary), true]);
    if (d.appearance_height) profileLines.push(['키', esc(d.appearance_height), true]);
    if (d.appearance_hair) profileLines.push(['헤어', esc(d.appearance_hair), true]);
    if (d.fashion_style) profileLines.push(['패션', esc(d.fashion_style), true]);
    if (d.speech_style) profileLines.push(['말투', esc(d.speech_style), true]);
    if (d.signature_expressions && d.signature_expressions.length) profileLines.push(['자주 쓰는 표현', joinList(d.signature_expressions), true]);
    if (d.relationship_to_owner?.type) {
      const r = d.relationship_to_owner;
      profileLines.push(['오너와의 관계', `${esc(r.type)}${r.pet_name ? ' (' + esc(r.pet_name) + ')' : ''}${r.duration ? ' · ' + esc(r.duration) : ''}`, true]);
      if (r.dynamics) profileLines.push(['dynamics', esc(r.dynamics), true]);
    }
    if (d.background) profileLines.push(['배경', esc(d.background), true]);

    // Relationships — 오너 관계 항상 최상단 고정 + intimacy band 색깔 + 이모지 (대시보드와 통일).
    const intimacyBand = (n) => {
      if (n >= 100) return { label: '연인', cls: 'b-lover', emoji: '💖' };
      if (n >= 80) return { label: '절친', cls: 'b-best', emoji: '💞' };
      if (n >= 60) return { label: '친한 친구', cls: 'b-close', emoji: '🤝' };
      if (n >= 40) return { label: '친구', cls: 'b-friend', emoji: '🙂' };
      if (n >= 20) return { label: '어색', cls: 'b-awkward', emoji: '😶' };
      if (n >= 1) return { label: '적대', cls: 'b-hostile', emoji: '😠' };
      return { label: '원수', cls: 'b-enemy', emoji: '🔥' };
    };
    const relTypeEmoji = (t) => {
      if (!t) return '';
      if (/매니저|관리/.test(t)) return '🛡️';
      if (/크리에이터|creator/.test(t)) return '🎨';
      if (/개발/.test(t)) return '🛠️';
      if (/연인|애인/.test(t)) return '💖';
      if (/가족|엄마|아빠|형|누나|언니|오빠|동생/.test(t)) return '👨‍👩‍👧';
      if (/친구/.test(t)) return '🙂';
      if (/라이벌/.test(t)) return '⚔️';
      if (/멘토|선생/.test(t)) return '🎓';
      if (/짝사랑/.test(t)) return '💗';
      if (/원수|적/.test(t)) return '🔥';
      return '·';
    };
    const renderRelRow = (r, opts = {}) => {
      const pct = Math.min(100, r.intimacy || 0);
      const band = intimacyBand(r.intimacy || 0);
      const ownerTag = opts.isOwner ? `<span style="color:var(--accent);font-size:10px;font-weight:600;margin-right:4px">OWNER</span>` : '';
      const tEmoji = relTypeEmoji(r.type);
      return `<div class="rel-row${opts.isOwner ? ' rel-owner' : ''}">
        <span class="rname" title="${esc(r.other_name)}">${ownerTag}${esc(r.other_name)}</span>
        <div class="intimacy-bar-v2 band-${band.cls}" title="친밀도 ${r.intimacy}/100 (0=원수 100=연인)">
          <div class="intimacy-bar-fill" style="width:${pct}%"></div>
          <div class="intimacy-bar-text">
            <span class="rel-type">${tEmoji} ${esc(r.type || '—')}</span>
            <span class="rel-sep">·</span>
            <span class="rel-band">${band.emoji} ${band.label}</span>
            <span class="rel-score">${r.intimacy}/100</span>
          </div>
        </div>
        ${r.dynamics ? `<span class="dynamics" title="${esc(r.dynamics)}">${esc(r.dynamics)}</span>` : ''}
      </div>`;
    };
    // 오너 row 분리 — 이미 relationships 안에 있으면 pop 해서 최상단에, 없으면 placeholder.
    const allRels = (d.relationships || []).slice();
    const ownerRow = (() => {
      if (!d.owner_id) return null;
      const idx = allRels.findIndex(r => r.other_id === d.owner_id);
      if (idx >= 0) {
        return allRels.splice(idx, 1)[0];
      }
      // placeholder — 아직 관계 row 안 생성된 경우 (mgr/creator 등 오너와 명시적 row 없음)
      return {
        other_id: d.owner_id,
        other_name: d.owner_name || '오너',
        type: '—',
        intimacy: 0,
        dynamics: '아직 기록된 관계 없음',
        _placeholder: true,
      };
    })();
    const relsHtml =
      (ownerRow ? renderRelRow(ownerRow, { isOwner: true }) : '') +
      allRels.map(r => renderRelRow(r)).join('');
    const rels = relsHtml;

    // Memory — dashboard.js 로직 포팅
    const TYPE_LABEL = {
      event: {label: '사건', icon: '🎬'},
      fact: {label: '사실', icon: '💡'},
      emotion: {label: '감정', icon: '💓'},
      relationship: {label: '관계', icon: '🤝'},
    };
    const renderMemItem = (m, opts = {}) => {
      const t = m.mem_type ? TYPE_LABEL[m.mem_type] : null;
      const typeBadge = t ? `<span class="mem-type-badge" title="유형">${t.icon} ${t.label}</span>` : '';
      const imp = m.importance ? `<span class="mem-imp" title="중요도 ${m.importance}/10">${m.importance}</span>` : '';
      const pin = m.is_pinned ? '<span class="mem-pin" title="고정됨">📌</span>' : '';
      const ents = (m.related_entities && m.related_entities.length)
        ? `<span class="mem-ents" title="관련 대상">${m.related_entities.map(e => esc(e)).join(' · ')}</span>` : '';
      const ch = opts.showChannel && m.channel ? `<span class="mem-ch">${esc(m.channel)}</span>` : '';
      return `<div class="mem-item" data-mem-id="${m.id || ''}">
        ${pin}${typeBadge}${imp}
        <span class="mcontent">${esc(m.content)}</span>
        ${ents}${ch}
        <span class="mts">${esc(fmtLocalMonthDayHM(m.created_at))}</span>
      </div>`;
    };
    const LAYER_LABEL = {
      1: {name: '최근', icon: '📖', desc: '최근 몇 분~몇 시간 요약'},
      2: {name: '중기', icon: '📚', desc: '하루 분량 묶음 요약'},
      3: {name: '장기', icon: '🗂', desc: '주/월 단위 큰 흐름'},
    };
    let memHtml = '';
    if ((d.pinned_memories || []).length) {
      memHtml += `<div class="mem-block mem-pinned-block">
        <h5>📌 고정된 기억 <span class="mem-count">(${d.pinned_memories.length})</span>
          <span class="mem-sub">항상 떠올리는 기억</span></h5>
        ${d.pinned_memories.map(m => renderMemItem(m, {showChannel: true})).join('')}
      </div>`;
    }
    for (const [ch, mems] of Object.entries(d.memories_by_channel || {})) {
      const byLevel = {3: [], 2: [], 1: []};
      mems.forEach(m => { (byLevel[m.level] || byLevel[1]).push(m); });
      const anyLevels = [3, 2, 1].filter(l => byLevel[l].length);
      if (!anyLevels.length) continue;
      memHtml += `<div class="mem-block">
        <h5><span class="ch-icon">${chIcon(ch)}</span> ${esc(ch)} <span class="mem-count">(${mems.length})</span></h5>
        ${anyLevels.map(l => {
          const L = LAYER_LABEL[l];
          return `<div class="mem-lvl-group">
            <div class="mem-lvl-label" title="${L.desc}">${L.icon} ${L.name} <span class="mem-count">(${byLevel[l].length})</span></div>
            ${byLevel[l].map(renderMemItem).join('')}
          </div>`;
        }).join('')}
      </div>`;
    }
    if ((d.agent_facts || []).length) {
      const bySubject = {};
      (d.agent_facts || []).forEach(f => {
        if (!bySubject[f.subject]) bySubject[f.subject] = [];
        bySubject[f.subject].push(f);
      });
      memHtml += `<div class="mem-block mem-facts-group">
        <h5>💡 알고 있는 사실 <span class="mem-count">(${d.agent_facts.length})</span>
          <span class="mem-sub">대상별 구조화된 지식 (선호·특징·직업 등)</span></h5>`;
      memHtml += Object.entries(bySubject).map(([subject, facts]) =>
        `<div class="mem-subject-block">
          <div class="mem-subject-label">${esc(subject)} <span class="mem-count">(${facts.length})</span></div>
          ${facts.map(f => `<div class="mem-item">
            <span class="mem-predicate">${esc(f.predicate)}</span>
            <span class="mcontent">${esc(f.object)}</span>
            ${f.importance >= 8 ? '<span class="mem-pin" title="중요">⭐</span>' : ''}
            <span class="mts">${esc(fmtLocalMonthDayHM(f.created_at))}</span>
          </div>`).join('')}
        </div>`
      ).join('');
      memHtml += '</div>';
    }
    if ((d.relationship_history || []).length) {
      memHtml += `<div class="mem-block">
        <h5>📈 관계 변화 <span class="mem-count">(${d.relationship_history.length})</span>
          <span class="mem-sub">친밀도·역학의 변곡점 기록</span></h5>
        ${d.relationship_history.slice(0, 10).map(h => `<div class="mem-item">
          <span class="mem-predicate">${esc(h.delta_type || '?')}</span>
          <span class="mcontent">${esc(h.from_state || '?')} → ${esc(h.to_state || '?')}${h.reason ? ' · ' + esc(h.reason) : ''}</span>
          <span class="mts">${esc(fmtLocalMonthDayHM(h.created_at))}</span>
        </div>`).join('')}
      </div>`;
    }

    const thinkingLogs = (d.thinking_logs || []).map(l =>
      `<div class="logline" style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);padding:2px 0">${esc(l)}</div>`
    ).join('');
    const chatHtml = (d.primary_chat || []).map(m => renderMessage({...m, channel: d.primary_channel})).join('');

    // Render — 모든 섹션을 항상 렌더해 사이드바 앵커가 항상 매치되도록 함.
    // 비어있는 섹션은 안내 문구로 대체.
    const renderKv = (lines) => `<dl class="kv">${lines.map(([k, v, raw]) => `<dt>${esc(k)}</dt><dd>${raw ? v : esc(v)}</dd>`).join('')}</dl>`;
    const body = `
      <section id="status" class="detail-section">
        <h4>📊 상태</h4>
        ${statusLines.length ? renderKv(statusLines) : '<div class="empty">상태 정보가 없습니다</div>'}
      </section>
      <section id="profile" class="detail-section">
        <h4>👤 프로필</h4>
        ${profileLines.length ? renderKv(profileLines) : '<div class="empty">프로필 정보가 없습니다</div>'}
      </section>
      <section id="relationships" class="detail-section">
        <h4>🤝 관계${(d.relationships || []).length ? ` · ${d.relationships.length}` : ''}</h4>
        ${rels || '<div class="empty">아직 맺어진 관계가 없습니다</div>'}
      </section>
      <section id="memory" class="detail-section">
        <h4>🧠 메모리</h4>
        ${memHtml || '<div class="empty">기억이 아직 쌓이지 않았습니다</div>'}
      </section>
      <section id="thinking" class="detail-section">
        <h4>💭 추론 로그</h4>
        ${thinkingLogs || '<div class="empty">최근 추론 로그가 없습니다</div>'}
      </section>
      <section id="chat" class="detail-section">
        <h4>💬 최근 대화${d.primary_channel ? ` · ${esc(d.primary_channel)}` : ''}</h4>
        ${chatHtml || '<div class="empty">최근 대화가 없습니다</div>'}
      </section>
    `;
    document.getElementById('page-body').innerHTML = body;

    // Scroll-spy — scroll position 기반 (IntersectionObserver 는 여러 섹션 동시 교차 시
    // topmost 선택해서 사용자가 "chat" 클릭했는데 바로 위 "thinking" 이 active 로 잡히는 버그).
    // scrollY + threshold(=offset) 가 섹션 top 을 지났는지 기준으로 "가장 마지막에 지난" 섹션 active.
    // 기본 앵커 동작 (href="#id") 은 브라우저 native 라 스크롤은 native 가 처리.
    const links = Array.from(document.querySelectorAll('aside.side-nav .nav-link'));
    const sections = links
      .map(a => document.getElementById(a.dataset.target))
      .filter(Boolean);
    const setActive = (id) => {
      links.forEach(a => a.classList.toggle('active', a.dataset.target === id));
    };
    // Scroll-spy 정확성 보강:
    //  1) offsetTop 은 offsetParent 상대값 (grid ancestor 여도) — document 기준 필요하면
    //     getBoundingClientRect().top (viewport 기준) 을 쓰는 게 더 정확.
    //  2) 링크 클릭 → smooth scroll 진행 중 scroll event 가 계속 fire → 중간 scrollY 로
    //     update 하면 아직 목표 섹션에 도달 전이라 **이전 섹션** 이 active 로 덮어쓰기.
    //     → 클릭 후 900ms 동안은 scroll-spy 비활성화 (click 이 우선).
    const THRESHOLD = 88; // scroll-margin-top(72) + topbar 여유
    let clickLockUntil = 0;
    const updateActive = () => {
      if (Date.now() < clickLockUntil) return;
      // getBoundingClientRect().top = viewport top 기준 거리. 이 값이 THRESHOLD 아래면
      // 섹션 top 이 topbar 바로 아래 또는 이미 지난 상태.
      let current = sections[0];
      for (const sec of sections) {
        const top = sec.getBoundingClientRect().top;
        if (top <= THRESHOLD) current = sec;
      }
      if (current) setActive(current.id);
    };
    if (sections.length) {
      links.forEach(a => {
        a.addEventListener('click', () => {
          setActive(a.dataset.target);
          // smooth scroll 동안 scroll-spy 잠금 (브라우저별 smooth 완료 시간 ~500-700ms)
          clickLockUntil = Date.now() + 900;
        });
      });
      window.addEventListener('scroll', updateActive, { passive: true });
      window.addEventListener('resize', updateActive);
      const hashId = (location.hash || '').replace('#', '');
      if (hashId && sections.some(s => s.id === hashId)) {
        setActive(hashId);
        clickLockUntil = Date.now() + 900; // 초기 hash 도 잠금
      } else {
        updateActive();
      }
    }
  }

  load();
})();
</script>
