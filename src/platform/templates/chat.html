{% extends "base.html" %}
{% block title %}Glimi · {{ community_name }} 채팅{% endblock %}
{% block head %}
  <link rel="stylesheet" href="/static/css/tokens.css?v={{ asset_v }}">
  <link rel="stylesheet" href="/static/css/chat.css?v={{ asset_v }}">
{% endblock %}

{% block header_middle %}
  <span class="chat-topbar-title">{{ community_name }}</span>
{% endblock %}

{% block content %}
<div class="chat-wrap">
  <div class="chat-head">
    <span class="chat-channel-label" id="chat-channel-label"># {{ channel }}</span>
    <span class="chat-status" id="chat-status" data-state="connecting">연결 중…</span>
  </div>

  <div class="chat-messages" id="chat-messages" aria-live="polite"></div>

  <div class="chat-typing" id="chat-typing" hidden>
    <span class="chat-typing-dot"></span>
    <span class="chat-typing-dot"></span>
    <span class="chat-typing-dot"></span>
    <span class="chat-typing-who" id="chat-typing-who"></span>
  </div>

  <form class="chat-composer" id="chat-composer">
    <input
      type="text"
      class="chat-input"
      id="chat-input"
      placeholder="메시지를 입력하세요…"
      autocomplete="off"
      maxlength="2000"
    >
    <button type="submit" class="chat-send" id="chat-send">보내기</button>
  </form>
</div>
{% endblock %}

{% block bottom_scripts %}
  <script>
    window.__GLIMI_COMMUNITY__ = {{ community_id|tojson }};
    window.__GLIMI_CHANNEL__   = {{ channel|tojson }};
    window.__GLIMI_AGENT__     = {{ agent_id|tojson }};
  </script>
  <script src="/static/js/chat.js?v={{ asset_v }}"></script>
{% endblock %}
