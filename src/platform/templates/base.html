<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Glimi{% endblock %}</title>
  <script>
    // 페이지 렌더 전에 저장된 테마 적용 — FOUC 방지
    (function() {
      try {
        var saved = localStorage.getItem('glimi-theme');
        if (saved === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
      } catch (e) {}
    })();
  </script>
  <style>
    /* Light (default) */
    :root[data-theme="light"] {
      --bg: #fafafa;
      --panel: #ffffff;
      --panel2: #f3f4f6;
      --text: #111827;
      --muted: #6b7280;
      --accent: #2563eb;
      --accent-fg: #ffffff;
      --ok: #10b981;
      --warn: #f59e0b;
      --err: #ef4444;
      --border: #e5e7eb;
      --shadow: 0 1px 2px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.06);
    }
    /* Dark */
    :root[data-theme="dark"] {
      --bg: #0e0f12;
      --panel: #17191f;
      --panel2: #1d1f27;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #7aa2f7;
      --accent-fg: #0e0f12;
      --ok: #9ece6a;
      --warn: #e0af68;
      --err: #f7768e;
      --border: #2a2d36;
      --shadow: none;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
      background: var(--bg); color: var(--text); line-height: 1.5;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    header.topbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 20px; background: var(--panel); border-bottom: 1px solid var(--border);
    }
    header.topbar h1 { margin: 0; font-size: 16px; font-weight: 600; }
    header.topbar .right { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 10px; }
    main { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }
    button, .btn {
      background: var(--panel2); color: var(--text); border: 1px solid var(--border);
      padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px;
      font-family: inherit;
    }
    button:hover, .btn:hover { background: var(--border); }
    button.primary { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); font-weight: 500; }
    button.primary:hover { opacity: 0.92; background: var(--accent); }
    button.danger { background: transparent; color: var(--err); border-color: var(--err); }
    button.danger:hover { background: var(--err); color: var(--accent-fg); }
    button.icon {
      padding: 6px 10px; font-size: 15px; line-height: 1;
    }
    input, select {
      background: var(--panel2); color: var(--text); border: 1px solid var(--border);
      padding: 7px 10px; border-radius: 6px; font-size: 14px; font-family: inherit;
    }
    input:focus, select:focus { outline: 2px solid var(--accent); outline-offset: -1px; border-color: var(--accent); }
    .card {
      background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
      padding: 18px; margin-bottom: 16px; box-shadow: var(--shadow);
    }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
    .pill.running { background: var(--ok); color: #ffffff; }
    .pill.stopped { background: var(--muted); color: #ffffff; }
    .err { color: var(--err); font-size: 13px; margin-top: 8px; }
    .muted { color: var(--muted); font-size: 13px; }
    code { background: var(--panel2); padding: 1px 5px; border-radius: 4px; font-size: 0.9em; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  {% if user %}
  <header class="topbar">
    <h1><a href="/" style="color: inherit;">Glimi</a></h1>
    <div class="right">
      {{ user.username }} <span class="pill {{ 'running' if user.role == 'admin' else 'stopped' }}">{{ user.role }}</span>
      <button class="icon" onclick="toggleTheme()" title="테마 전환" aria-label="테마 전환">
        <span id="theme-icon">🌙</span>
      </button>
      <form method="post" action="/logout" style="display: inline;">
        <button type="submit">logout</button>
      </form>
    </div>
  </header>
  {% else %}
  <div style="position: fixed; top: 14px; right: 20px;">
    <button class="icon" onclick="toggleTheme()" title="테마 전환" aria-label="테마 전환">
      <span id="theme-icon">🌙</span>
    </button>
  </div>
  {% endif %}
  <main>
    {% block content %}{% endblock %}
  </main>
  <script>
    function _applyThemeIcon() {
      var t = document.documentElement.getAttribute('data-theme') || 'light';
      var el = document.getElementById('theme-icon');
      if (el) el.textContent = t === 'dark' ? '☀️' : '🌙';
    }
    function toggleTheme() {
      var cur = document.documentElement.getAttribute('data-theme') || 'light';
      var next = cur === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      try { localStorage.setItem('glimi-theme', next); } catch (e) {}
      _applyThemeIcon();
    }
    _applyThemeIcon();
  </script>
</body>
</html>
